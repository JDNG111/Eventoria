<!doctype html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventoria - Gestión de Eventos</title>
    
    <!-- Pico CSS - MODO CLARO -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Custom Styles -->
    <style>
      /* FORZAR MODO CLARO - ESTO ES CRÍTICO */
      :root {
        --background-color: #f8fafc !important;
        --card-background-color: #ffffff !important;
        --card-sectionning-background-color: #ffffff !important;
        --color: #1e293b !important;
        --h1-color: #1e293b !important;
        --h2-color: #1e293b !important;
        --h3-color: #1e293b !important;
        --h4-color: #1e293b !important;
        --h5-color: #1e293b !important;
        --h6-color: #1e293b !important;
        --primary: #667eea;
        --primary-hover: #5a67d8;
        --primary-focus: rgba(102, 126, 234, 0.125);
        --primary-inverse: #FFF;
        
        /* Sobrescribir cualquier variable de Pico que pueda causar fondo oscuro */
        color-scheme: light;
      }

      /* Asegurar que el body tenga fondo claro */
      body {
        background-color: #f8fafc !important;
        min-height: 100vh;
        color: #1e293b !important;
        margin: 0;
        padding: 0;
      }

      /* Forzar todos los textos a color oscuro */
      body, p, h1, h2, h3, h4, h5, h6, span, div, main, section, article {
        color: #1e293b !important;
      }

      /* Hero section con gradiente - mantener texto blanco solo aquí */
      .hero-section {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white !important;
        padding: 3rem 0;
        margin-bottom: 2rem;
        border-radius: 0 0 2rem 2rem;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      }

      .hero-section h1,
      .hero-section p,
      .hero-section h2,
      .hero-section h3 {
        color: white !important;
      }

      .hero-section button {
        background: rgba(255,255,255,0.2);
        border: 1px solid white;
        color: white !important;
      }

      .hero-section button:hover {
        background: rgba(255,255,255,0.3);
        color: white !important;
      }

      /* Cards con fondo blanco */
      .card {
        background: #ffffff !important;
        border-radius: 1rem;
        padding: 1.5rem;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        margin-bottom: 1.5rem;
        transition: transform 0.2s, box-shadow 0.2s;
        border: 1px solid #e9ecef;
      }

      .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 12px rgba(0,0,0,0.1);
      }

      .event-card {
        border-left: 4px solid #667eea;
        background: #ffffff !important;
      }

      .event-card h3,
      .event-card p,
      .event-card div {
        color: #1e293b !important;
      }

      .event-badge {
        background: #667eea;
        color: white !important;
        padding: 0.25rem 0.75rem;
        border-radius: 1rem;
        font-size: 0.85rem;
        font-weight: 600;
      }

      .event-badge.free {
        background: #28a745;
      }

      .event-meta {
        display: flex;
        gap: 1.5rem;
        margin: 1rem 0;
        flex-wrap: wrap;
      }

      .event-meta-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: #6c757d !important;
        font-size: 0.9rem;
      }

      .btn-gradient {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
        color: white !important;
        border: none;
        transition: opacity 0.2s;
      }

      .btn-gradient:hover {
        opacity: 0.9;
        color: white !important;
      }

      .btn-gradient:disabled {
        opacity: 0.5;
      }

      .map-container {
        height: 300px;
        border-radius: 0.5rem;
        overflow: hidden;
        margin: 1rem 0;
        border: 2px solid rgba(102, 126, 234, 0.2);
        background: #ffffff;
      }

      /* Auth container con fondo blanco */
      .auth-container {
        max-width: 450px;
        margin: 2rem auto;
      }

      .auth-card {
        background: #ffffff !important;
        border-radius: 1rem;
        padding: 2rem;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        border: 1px solid #e9ecef;
      }

      .auth-card h2 {
        color: #1e293b !important;
      }

      .auth-card label {
        color: #1e293b !important;
      }

      .auth-card a {
        color: #667eea !important;
        text-decoration: none;
      }

      .auth-card a:hover {
        text-decoration: underline;
      }

      .logo {
        font-size: 2rem;
        font-weight: bold;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-align: center;
        margin-bottom: 1rem;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
        margin: 2rem 0;
      }

      .stat-card {
        text-align: center;
        padding: 1.5rem;
        background: #ffffff !important;
        border-radius: 1rem;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        border: 1px solid #e9ecef;
      }

      .stat-number {
        font-size: 2.5rem;
        font-weight: bold;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .stat-label {
        color: #6c757d !important;
        font-size: 0.9rem;
        margin-top: 0.5rem;
      }

      .spinner {
        border: 3px solid rgba(102, 126, 234, 0.3);
        border-top: 3px solid #667eea;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 2rem auto;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .empty-state {
        text-align: center;
        padding: 4rem 2rem;
        color: #6c757d !important;
      }

      .empty-state h3 {
        color: #1e293b !important;
      }

      .empty-state-icon {
        font-size: 4rem;
        margin-bottom: 1rem;
        opacity: 0.5;
      }

      .tab-navigation {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 2rem;
        background: #ffffff !important;
        padding: 0.5rem;
        border-radius: 0.5rem;
        border: 1px solid #e9ecef;
      }

      .tab-button {
        flex: 1;
        background: transparent;
        border: none;
        padding: 0.75rem;
        border-radius: 0.25rem;
        cursor: pointer;
        transition: all 0.2s;
        font-weight: 500;
        color: #1e293b !important;
      }

      .tab-button.active {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white !important;
      }

      .tab-button:hover:not(.active) {
        background: rgba(102, 126, 234, 0.1);
      }

      /* NOTIFICACIONES */
      .notification {
        position: fixed;
        top: 1rem;
        right: 1rem;
        background: white !important;
        padding: 1rem 1.5rem;
        border-radius: 0.5rem;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        animation: slideInRight 0.3s ease-out;
        z-index: 9999;
        max-width: 400px;
        border: 1px solid #e9ecef;
      }

      .notification strong,
      .notification span {
        color: #1e293b !important;
      }

      .notification.success {
        border-left: 4px solid #28a745;
        background: #d4edda !important;
      }

      .notification.success strong,
      .notification.success span {
        color: #155724 !important;
      }

      .notification.error {
        border-left: 4px solid #dc3545;
        background: #f8d7da !important;
      }

      .notification.error strong,
      .notification.error span {
        color: #721c24 !important;
      }

      .notification.info {
        border-left: 4px solid #17a2b8;
        background: #d1ecf1 !important;
      }

      .notification.info strong,
      .notification.info span {
        color: #0c5460 !important;
      }

      .notification.warning {
        border-left: 4px solid #ffc107;
        background: #fff3cd !important;
      }

      .notification.warning strong,
      .notification.warning span {
        color: #856404 !important;
      }

      @keyframes slideInRight {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      /* Inputs y forms */
      input, textarea, select {
        color: #1e293b !important;
        background: #ffffff !important;
        border: 1px solid #ced4da !important;
        border-radius: 0.375rem;
        padding: 0.5rem 0.75rem;
      }

      input::placeholder,
      textarea::placeholder {
        color: #6c757d !important;
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: #667eea !important;
        outline: none;
        box-shadow: 0 0 0 0.25rem rgba(102, 126, 234, 0.25) !important;
      }

      /* Buttons normales */
      button:not(.btn-gradient):not(.tab-button) {
        background: #667eea !important;
        color: white !important;
        border: none !important;
        padding: 0.5rem 1rem;
        border-radius: 0.375rem;
        cursor: pointer;
        transition: background 0.2s;
      }

      button:not(.btn-gradient):not(.tab-button):hover {
        background: #5a67d8 !important;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* Footer */
      footer {
        color: #6c757d !important;
      }

      /* Small text */
      small {
        color: #6c757d !important;
      }

      /* Descripción de eventos */
      .event-card p {
        color: #6c757d !important;
      }

      /* Override de Pico */
      article {
        background: #ffffff !important;
        color: #1e293b !important;
      }

      main {
        background: #f8fafc !important;
        color: #1e293b !important;
      }

      section {
        background: transparent !important;
      }

      /* Asegurar que todo el contenido tenga fondo claro */
      #app {
        background: #f8fafc !important;
        min-height: 100vh;
        color: #1e293b !important;
      }

      /* Mobile responsiveness */
      @media (max-width: 768px) {
        .hero-section {
          padding: 2rem 0;
        }

        .event-meta {
          flex-direction: column;
          gap: 0.75rem;
        }

        .tab-navigation {
          flex-direction: column;
        }

        .notification {
          left: 1rem;
          right: 1rem;
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </body>
</html>
